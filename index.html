<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Adarsh Vijay | Software Engineer</title>
    <meta name="description" content="Adarsh Vijay — software engineer building thoughtful, well-architected products." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('av-theme');
          document.documentElement.setAttribute(
            'data-theme',
            t === 'dark' ? 'dark' : 'light'
          );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <script>
      (function () {
        var q = window.location.search;
        var m = q.match(/[?&]p=([^&]+)/);
        if (m) {
          var path = decodeURIComponent(m[1]);
          var rest = q.replace(/[?&]p=[^&]+/, '').replace(/^&/, '?');
          if (rest === '?') rest = '';
          window.history.replaceState(null, '', path + rest + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
