<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Adarsh Vijay</title>
    <script>
      // SPA fallback: rewrite the requested path into a query and bounce to /
      (function () {
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
